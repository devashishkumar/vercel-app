<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Profile - Ashish</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind config for dark mode
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-500">
  <div class="container mx-auto p-6">

    <!-- Dark/Light Mode Toggle -->
    <div class="flex justify-end mb-4">
      <button id="theme-toggle" class="px-4 py-2 bg-gray-300 dark:bg-gray-700 rounded-lg shadow hover:bg-gray-400 dark:hover:bg-gray-600 transition">
        Toggle Dark/Light
      </button>
    </div>

    <!-- Profile Section -->
    <div id="profile" class="text-center"></div>

    <!-- Repositories Section -->
    <h2 class="text-2xl font-bold mt-10 mb-4">Top Repositories</h2>
    <div id="repos" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
